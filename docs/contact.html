<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Troop and Crew 537 in Lakewood, CO. Interested in joining or have questions about Scouting? Send us a message and we'll get back to you.">
  <title>Contact | Troop and Crew 537 | Lakewood, CO</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="page-header-placeholder"></div>
<div id="main-navigation-placeholder"></div>



<div id="wrapper">
  <div id="content">

    <h1>Contact</h1>
    <p>Are you interested in joining our Troop or want more information?</p>
    <div class="contact-form">
      <form action="https://formspree.io/f/xyknkqdd" method="POST">
        <div class="field-row">
          <label>Name *</label>
          <div class="name-row">
            <div>
              <input type="text" name="first_name" placeholder="First" required>
            </div>
            <div>
              <input type="text" name="last_name" placeholder="Last" required>
            </div>
          </div>
        </div>
        <div class="field-row">
          <label>Email *</label>
          <input type="email" name="email" required>
        </div>
        <div class="field-row">
          <label>Comment or Message *</label>
          <textarea name="message" required></textarea>
        </div>
        <div class="field-row">
          <button type="submit" class="submit-btn">Submit</button>
        </div>
      </form>
    </div>
    <p style="margin-top:16px;"><img src="images/IMG_0883-300x234.jpg" alt="" style="max-width:300px;"></p>

  </div>

<div id="sidebar">
  <div class="widget">
    <img src="images/IMG_0883-300x234.jpg" alt="">
  </div>
</div>

</div>


<div id="footer-placeholder"></div>

<script src="includes/site.js"></script>
</body>
</html>
